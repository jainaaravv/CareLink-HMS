<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Hospital Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* Animated Background Shapes */
.bg-shape {
  position: absolute;
  opacity: 0.1;
  z-index: 0;
}

.shape-1 {
  width: 400px;
  height: 400px;
  background: white;
  border-radius: 50%;
  top: -200px;
  right: -100px;
  animation: float 6s ease-in-out infinite;
}

.shape-2 {
  width: 300px;
  height: 300px;
  background: white;
  border-radius: 50%;
  bottom: -150px;
  left: -100px;
  animation: float 8s ease-in-out infinite reverse;
}

.shape-3 {
  width: 200px;
  height: 200px;
  background: white;
  border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
  top: 50%;
  right: 10%;
  animation: morph 10s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
}

@keyframes morph {
  0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
  50% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
}

/* Back Button */
.back-btn {
  position: absolute;
  top: 30px;
  left: 30px;
  z-index: 1000;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  border: none;
  padding: 12px 24px;
  border-radius: 50px;
  color: #667eea;
  font-weight: 600;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.back-btn:hover {
  transform: translateX(-5px);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
  color: #667eea;
}

/* Login Container - Horizontal Layout */
.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 1100px;
}

.login-card {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  padding: 50px;
  border: none;
  transition: transform 0.3s ease;
}

.login-card:hover {
  transform: translateY(-5px);
}

/* Horizontal Layout Grid */
.login-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

/* Left Side - Branding */
.login-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.logo-container {
  width: 120px;
  height: 120px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 30px;
  box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

.logo-container i {
  font-size: 56px;
  color: white;
}

.login-title {
  color: #2d3748;
  font-weight: 700;
  margin-bottom: 12px;
  font-size: 2.5rem;
  text-align: center;
  letter-spacing: -0.5px;
}

.login-subtitle {
  color: #718096;
  font-size: 1.1rem;
  text-align: center;
  font-weight: 400;
}

/* Right Side - Form */
.login-right {
  padding: 20px;
}

/* Form Styles */
.form-label {
  font-weight: 600;
  color: #2d3748;
  margin-bottom: 8px;
  font-size: 0.95rem;
  letter-spacing: 0.3px;
}

.input-group-custom {
  position: relative;
  margin-bottom: 20px;
}

.input-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: #a0aec0;
  font-size: 1.1rem;
  z-index: 10;
  transition: color 0.3s ease;
}

.form-control {
  padding: 14px 18px 14px 48px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-size: 1rem;
  transition: all 0.3s ease;
  background: white;
}

.form-control:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
  outline: none;
}

.form-control:focus + .input-icon {
  color: #667eea;
}

/* Password Toggle */
.password-toggle {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #a0aec0;
  cursor: pointer;
  padding: 5px;
  font-size: 1.1rem;
  z-index: 10;
  transition: color 0.3s ease;
}

.password-toggle:hover {
  color: #667eea;
}

/* Role Selection - Horizontal */
.role-selection {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-bottom: 25px;
}

.role-option {
  position: relative;
}

.role-option input[type="radio"] {
  position: absolute;
  opacity: 0;
}

.role-label {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 15px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  background: white;
}

.role-label i {
  font-size: 1.8rem;
  margin-bottom: 8px;
  color: #a0aec0;
  transition: color 0.3s ease;
}

.role-label span {
  font-size: 0.9rem;
  font-weight: 600;
  color: #4a5568;
}

.role-option input[type="radio"]:checked + .role-label {
  border-color: #667eea;
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
}

.role-option input[type="radio"]:checked + .role-label i {
  color: #667eea;
}

.role-label:hover {
  border-color: #667eea;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
}

/* Login Button */
.btn-login {
  width: 100%;
  padding: 16px;
  font-size: 1.05rem;
  font-weight: 600;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
  position: relative;
  overflow: hidden;
  margin-top: 10px;
}

.btn-login::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

.btn-login:hover::before {
  width: 300px;
  height: 300px;
}

.btn-login:hover {
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
  transform: translateY(-2px);
}

.btn-login i {
  margin-left: 8px;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  margin: 25px 0;
  color: #a0aec0;
  font-size: 0.9rem;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

.divider::before {
  margin-right: 15px;
}

.divider::after {
  margin-left: 15px;
}

/* Register Link */
.register-link {
  text-align: center;
  margin-top: 20px;
  color: #718096;
  font-size: 0.95rem;
}

.register-link a {
  color: #667eea;
  text-decoration: none;
  font-weight: 600;
  transition: color 0.3s ease;
}

.register-link a:hover {
  color: #764ba2;
  text-decoration: underline;
}

/* Responsive */
@media (max-width: 992px) {
  .login-content {
    grid-template-columns: 1fr;
    gap: 40px;
  }

  .login-left {
    padding: 0;
  }

  .logo-container {
    width: 80px;
    height: 80px;
    margin-bottom: 20px;
  }

  .logo-container i {
    font-size: 36px;
  }

  .login-title {
    font-size: 2rem;
  }
}

@media (max-width: 576px) {
  .login-card {
    padding: 40px 30px;
  }

  .back-btn {
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    font-size: 0.9rem;
  }

  .role-selection {
    gap: 10px;
  }
}
</style>
</head>
<body>
  <!-- Background Shapes -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <!-- Back Button -->
  <a href="/" class="back-btn">
    <i class="fas fa-arrow-left"></i>
    <span>Back to Home</span>
  </a>

  <!-- Login Container -->
  <div class="login-container">
    <div class="login-card">
      <div class="login-content">
        <!-- Left Side - Branding -->
        <div class="login-left">
          <div class="logo-container">
            <i class="fas fa-user-shield"></i>
          </div>
          <h1 class="login-title">Welcome Back</h1>
          <p class="login-subtitle">Please login to your account</p>
        </div>

        <!-- Right Side - Form -->
        <div class="login-right">
          <form action="/login" method="post" autocomplete="off">
            
            <!-- Role Selection -->
            <div class="role-selection">
              <div class="role-option">
                <input type="radio" id="patient" name="role" value="patient" checked>
                <label for="patient" class="role-label">
                  <i class="fas fa-user"></i>
                  <span>Patient</span>
                </label>
              </div>
              <div class="role-option">
                <input type="radio" id="staff" name="role" value="staff">
                <label for="staff" class="role-label">
                  <i class="fas fa-user-md"></i>
                  <span>Staff</span>
                </label>
              </div>
            </div>

            <!-- Username Field -->
            <div class="mb-3">
              <label class="form-label">Username</label>
              <div class="input-group-custom">
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                <i class="fas fa-user input-icon"></i>
              </div>
            </div>

            <!-- Password Field -->
            <div class="mb-3">
              <label class="form-label">Password</label>
              <div class="input-group-custom">
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required maxlength="10">
                <i class="fas fa-lock input-icon"></i>
                <button type="button" class="password-toggle" onclick="togglePassword()">
                  <i class="fas fa-eye" id="toggleIcon"></i>
                </button>
              </div>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn-login">
              <span>Login</span>
              <i class="fas fa-arrow-right"></i>
            </button>

            <!-- Divider -->
            <div class="divider">or</div>

            <!-- Register Link -->
            <div class="register-link">
              Don't have an account? <a href="/register">Create Account</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% if error %}
<div class="alert alert-danger alert-dismissible fade show" role="alert">
  {{ error }}
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
{% endif %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }
  </script>
</body>
</html>
