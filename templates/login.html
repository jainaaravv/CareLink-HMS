<!doctype html>
<html lang="en">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(120deg, #6dd5ed 0%, #2193b0 100%);
            min-height: 100vh;
        }
        .card {
            border-radius: 18px;
            box-shadow: 0 2px 18px rgba(33,147,176,0.15);
        }
        .form-label {
            font-weight: 600;
            color: #2193b0;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background-color: #2193b0 !important;
            border: none;
        }
        .card-title {
            color: #2193b0;
        }
        .form-control:focus {
            border-color: #6dd5ed;
            box-shadow: 0 0 0 0.15rem #6dd5ed55;
        }
        .card {
            margin-top: 8vh;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-4 text-center">Login</h3>
                        <form action="/login" method="post" autocomplete="off">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm">Login</button>
                        </form>
                        <div class="mt-3 text-center">
                            <span>Don't have an account?</span>
                            <a href="/register" class="text-decoration-none" style="color: #2193b0;">Register</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
