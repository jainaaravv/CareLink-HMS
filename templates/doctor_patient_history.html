<!doctype html>
<html lang="en">
<head>
    <title>{{ patient[0] if patient else 'Patient' }} History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(120deg, #fcb69f 0%, #ffecd2 100%); min-height:100vh; }
        .main-card { max-width:900px; margin:40px auto; background:#fff; border-radius:18px; box-shadow:0 4px 24px rgba(44,62,80,0.11); padding:42px 28px; }
        h2 { color:#ff7746; }
        table th { background: #ff7746; color: #fff; }
    </style>
</head>
<body>
  <div class="main-card">
    <h2>History for {{ patient[0] if patient else 'Unknown Patient' }}</h2>
    <table class="table table-hover table-bordered align-middle mt-4">
      <thead>
        <tr>
          <th>Date</th><th>Time</th><th>Status</th><th>Diagnosis</th><th>Prescription</th><th>Notes</th>
        </tr>
      </thead>
      <tbody>
        {% for appt in appts %}
        <tr>
          <td>{{ appt[0] }}</td>
          <td>{{ appt[1] }}</td>
          <td>{{ appt[2] }}</td>
          <td>{{ appt[3] or '-' }}</td>
          <td>{{ appt[4] or '-' }}</td>
          <td>{{ appt[5] or '-' }}</td>
        </tr>
        {% else %}
        <tr>
          <td colspan="6" class="text-center text-muted">No history found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <a href="{{ url_for('doctor_dashboard') }}" class="btn btn-outline-secondary mt-2">Back to Dashboard</a>
  </div>
</body>
</html>
