<!doctype html>
<html lang="en">
<head>
  <title>Edit Doctor Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(120deg, #fcb69f 0%, #ffecd2 100%);
      min-height: 100vh;
    }
    .edit-container {
      max-width: 500px;
      margin: 60px auto;
      background: white;
      border-radius: 14px;
      padding: 32px 24px;
      box-shadow: 0 10px 28px rgba(33,147,176,0.07);
    }
  </style>
</head>
<body>
<div class="edit-container">
  <h3>Edit Profile</h3>
  <form method="POST">
      <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" name="name" value="{{ doctor[0] }}" required>
      </div>
      <div class="mb-3">
          <label class="form-label">Specialization</label>
          <input type="text" class="form-control" name="specialization" value="{{ doctor[1] }}" required>
      </div>
      <div class="mb-3">
          <label class="form-label">Contact</label>
          <input type="text" class="form-control" name="contact" value="{{ doctor[2] }}" required>
      </div>
      <button type="submit" class="btn btn-success">Save</button>
      <a href="{{ url_for('doctor_dashboard') }}" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
</body>
</html>
