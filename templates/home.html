<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: absolute;
  width: 500px;
  height: 500px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  top: -250px;
  right: -250px;
  z-index: 0;
}

body::after {
  content: '';
  position: absolute;
  width: 400px;
  height: 400px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 50%;
  bottom: -200px;
  left: -200px;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 480px;
  width: 100%;
}

.main-card {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  padding: 50px 45px;
  text-align: center;
  transition: transform 0.3s ease;
}

.main-card:hover {
  transform: translateY(-5px);
}

.logo-container {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 25px;
  box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

.logo-container i {
  font-size: 36px;
  color: white;
}

h1 {
  color: #2d3748;
  font-weight: 700;
  margin-bottom: 12px;
  font-size: 2rem;
  letter-spacing: -0.5px;
}

.subtitle {
  color: #718096;
  font-size: 1rem;
  margin-bottom: 35px;
  font-weight: 400;
  line-height: 1.6;
}

.btn-container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 30px;
}

.btn-custom {
  width: 100%;
  padding: 16px 24px;
  font-size: 1.05rem;
  font-weight: 600;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
}

.btn-custom::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

.btn-custom:hover::before {
  width: 300px;
  height: 300px;
}

.btn-custom i {
  font-size: 1.1rem;
  position: relative;
  z-index: 1;
}

.btn-custom span {
  position: relative;
  z-index: 1;
}

.btn-primary-custom {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.btn-primary-custom:hover {
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
  transform: translateY(-2px);
}

.btn-outline-custom {
  background: white;
  color: #667eea;
  border: 2px solid #667eea;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
}

.btn-outline-custom:hover {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border-color: transparent;
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
  transform: translateY(-2px);
}

.divider {
  display: flex;
  align-items: center;
  margin: 25px 0;
  color: #a0aec0;
  font-size: 0.9rem;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

.divider::before {
  margin-right: 15px;
}

.divider::after {
  margin-left: 15px;
}

.features {
  margin-top: 30px;
  padding-top: 25px;
  border-top: 1px solid #e2e8f0;
}

.feature-item {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: #718096;
  font-size: 0.9rem;
  margin: 8px 0;
}

.feature-item i {
  color: #667eea;
  font-size: 0.85rem;
}

@media (max-width: 576px) {
  .main-card {
    padding: 40px 30px;
  }

  h1 {
    font-size: 1.75rem;
  }

  .subtitle {
    font-size: 0.95rem;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="main-card">
    <div class="logo-container">
      <i class="fas fa-hospital"></i>
    </div>
    
    <h1>Hospital Management System</h1>
    <p class="subtitle">
      Streamlined healthcare management for patients and staff
    </p>
    
    <div class="btn-container">
      <a href="/login" class="btn-custom btn-primary-custom">
        <i class="fas fa-sign-in-alt"></i>
        <span>Login</span>
      </a>
      
      <div class="divider">or</div>
      
      <a href="/register" class="btn-custom btn-outline-custom">
        <i class="fas fa-user-plus"></i>
        <span>Register as Patient</span>
      </a>
    </div>
    
    <div class="features">
      <div class="feature-item">
        <i class="fas fa-check-circle"></i>
        <span>Secure & Confidential</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-check-circle"></i>
        <span>24/7 Access</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-check-circle"></i>
        <span>Easy Appointment Booking</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
