<!doctype html>
<html lang="en">
<head>
    <title>Book Appointment</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .appointment-card {
            border-radius: 16px;
            box-shadow: 0 8px 32px 4px rgba(33, 147, 176, 0.12);
            border: none;
            background: #fff;
            max-width: 550px;
            margin: 50px auto;
            padding: 0;
        }
        .appointment-header {
            background: linear-gradient(90deg, #43cea2 0%, #185a9d 100%);
            color: #fff;
            border-radius: 16px 16px 0 0;
            padding: 32px;
            text-align: center;
        }
        .appointment-header h2 {
            margin-bottom: 0.5rem;
            font-weight: 700;
            font-size: 2.3rem;
            letter-spacing: 1px;
        }
        .appointment-form {
            padding: 32px 28px 26px 28px;
        }
        .form-label {
            font-weight: 500;
        }
        .form-select:focus, 
        .form-control:focus {
            border-color: #43cea2;
            box-shadow: 0 0 0 2px rgba(33,147,176,0.13);
        }
        .btn-primary {
            background: linear-gradient(90deg, #43cea2 0%, #185a9d 100%);
            border: none;
            font-weight: 500;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #185a9d 0%, #43cea2 100%);
        }
        .btn-outline-secondary {
            border-radius: 2rem;
            font-weight: 500;
        }
        .icon-label {
            margin-right: 8px;
            font-size: 1.1em;
            color: #43cea2;
        }
        /* Availability Grid Improvements */
        #availabilityGrid table {
            background: #f7fcfe;
            border-radius: 10px;
            overflow: hidden;
        }
        #availabilityGrid th,
        #availabilityGrid td {
            vertical-align: middle;
            text-align: center;
        }
        .slot-btn {
            min-width: 94px;
            margin-bottom: 3px;
            font-size: 1em;
        }
        @media (max-width: 600px) {
            .appointment-card {
                margin: 13px 5px;
                max-width: 99vw;
                padding: 0;
            }
            .appointment-header, .appointment-form {
                padding: 16px 6px 16px 6px;
            }
            .slot-btn {
                min-width: 72px;
            }
        }
    </style>
</head>
<body>
    <div class="appointment-card card">
        <div class="appointment-header">
            <h2><i class="bi bi-calendar2-plus"></i> Book Appointment</h2>
            <div style="font-size:1.1em;">Select doctor to check real-time availability and book your slot</div>
        </div>
        <form method="POST" class="appointment-form">
            <div class="mb-3">
                <label class="form-label" for="doctorSelect">
                  <span class="icon-label"><i class="bi bi-person-badge"></i></span>Doctor
                </label>
                <select id="doctorSelect" name="doctor_id" class="form-select" required>
                    <option value="">Select a doctor</option>
                    {% for doctor in doctors %}
                        <option value="{{ doctor[0] }}">{{ doctor[1] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div id="availabilityGrid" class="mb-4"></div>

            <div class="mb-3">
                <label class="form-label" for="dateInput">
                  <span class="icon-label"><i class="bi bi-calendar-date"></i></span>Date
                </label>
                <input id="dateInput" type="date" name="date" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label" for="timeInput">
                  <span class="icon-label"><i class="bi bi-clock"></i></span>Time
                </label>
                <input id="timeInput" type="time" name="time" class="form-control" required>
            </div>
            <div class="d-flex justify-content-between align-items-center gap-3">
                <button class="btn btn-primary px-4" type="submit">
                  <i class="bi bi-check-circle me-1"></i>Book
                </button>
                <a href="{{ url_for('patient_dashboard') }}" class="btn btn-outline-secondary px-4">
                  <i class="bi bi-x-lg"></i> Cancel
                </a>
            </div>
        </form>
    </div>

    <script>
    const gridEl = document.getElementById('availabilityGrid');
    const doctorSelect = document.getElementById('doctorSelect');
    const dateInput = document.getElementById('dateInput');
    const timeInput = document.getElementById('timeInput');

    function renderGrid(data) {
        let slotTimes = ["08:00:00", "13:00:00", "18:00:00"];
        let prettySlot = [
            "Morning<br><small>8am–12pm</small>",
            "Afternoon<br><small>1pm–5pm</small>",
            "Evening<br><small>6pm–9pm</small>"
        ];
        let html = '<table class="table table-bordered my-0"><thead class="table-light"><tr><th>Date</th>';
        for (let s of prettySlot) html += '<th>' + s + '</th>';
        html += '</tr></thead><tbody>';
        Object.keys(data).forEach(d => {
            html += `<tr><td>${d}</td>`;
            data[d].forEach((x, i) => {
                if (x === 'available') {
                    html += `<td>
                      <button type="button" class="btn btn-success btn-sm slot-btn" onclick="pickSlot('${d}','${slotTimes[i]}')">Book</button></td>`;
                } else {
                    html += `<td><span class="badge bg-danger">Unavailable</span></td>`;
                }
            });
            html += '</tr>';
        });
        html += '</tbody></table>';
        gridEl.innerHTML = html;
        dateInput.setAttribute('disabled', 'disabled');
        timeInput.setAttribute('disabled', 'disabled');
    }

    function pickSlot(date, time) {
        dateInput.value = date;
        timeInput.value = time.substring(0,5);
        dateInput.removeAttribute('disabled');
        timeInput.removeAttribute('disabled');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    window.pickSlot = pickSlot;

    doctorSelect.addEventListener('change', function() {
        const docId = this.value;
        if (!docId) {
            gridEl.innerHTML = '';
            dateInput.removeAttribute('disabled');
            timeInput.removeAttribute('disabled');
            return;
        }
        gridEl.innerHTML = '<div class="text-center my-3 text-secondary"><span class="spinner-border spinner-border-sm"></span> Loading availability...</div>';
        fetch('/api/doctor_availability/' + docId)
            .then(x => x.json())
            .then(data => renderGrid(data));
    });
    </script>
</body>
</html>
