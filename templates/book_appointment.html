<!doctype html>
<html lang="en">
<head>
    <title>Book Appointment</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(to right, #83eaf1, #63a4ff);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .appointment-card {
            border-radius: 18px;
            box-shadow: 0 7px 32px 6px rgba(98, 174, 233, 0.10);
            border: none;
            background: white;
            max-width: 470px;
            margin: 38px auto 0 auto;
        }
        .appointment-header {
            background: linear-gradient(93deg, #36d1c4 0%, #5b86e5 100%);
            color: #fff;
            border-radius: 14px 14px 0 0;
            padding: 26px 36px 24px 36px;
            text-align: center;
            box-shadow: 0 2px 12px 2px rgba(91, 134, 229, 0.11);
        }
        .appointment-header h2 {
            margin-bottom: 0.3rem;
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: 1px;
        }
        .appointment-form {
            padding: 32px;
        }
        .form-label {
            font-weight: 500;
        }
        .form-select:focus, 
        .form-control:focus {
            border-color: #5b86e5;
            box-shadow: 0 0 0 2px rgba(91,134,229,0.15);
        }
        .btn-primary {
            background: linear-gradient(90deg, #36d1c4 0%, #5b86e5 100%);
            border: none;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #5b86e5 0%, #36d1c4 100%);
        }
        .btn-outline-secondary {
            border-radius: 2rem;
            font-weight: 500;
        }
        .icon-label {
            margin-right: 7px;
            font-size: 1.18em;
            color: #36d1c4;
        }
        @media (max-width: 600px) {
            .appointment-card {
                margin-top: 16px;
                max-width: 98vw;
                border-radius: 9px;
            }
            .appointment-header, .appointment-form {
                padding: 18px 10px 18px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="appointment-card card">
        <div class="appointment-header">
            <h2><i class="bi bi-calendar2-plus"></i> Book Appointment</h2>
            <div style="font-size:1.12em;">Select your doctor, date and time below</div>
        </div>
        <form method="POST" class="appointment-form">
            <div class="mb-3">
                <label class="form-label" for="doctorSelect">
                  <span class="icon-label"><i class="bi bi-person-badge"></i></span>Doctor
                </label>
                <select id="doctorSelect" name="doctor_id" class="form-select" required>
                    <option value="">Select a doctor</option>
                    {% for doctor in doctors %}
                        <option value="{{ doctor[0] }}">{{ doctor[1] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" for="dateInput">
                  <span class="icon-label"><i class="bi bi-calendar-date"></i></span>Date
                </label>
                <input id="dateInput" type="date" name="date" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label" for="timeInput">
                  <span class="icon-label"><i class="bi bi-clock"></i></span>Time
                </label>
                <input id="timeInput" type="time" name="time" class="form-control" required>
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <button class="btn btn-primary px-4" type="submit">
                  <i class="bi bi-check-circle me-1"></i>Book Appointment
                </button>
                <a href="{{ url_for('patient_dashboard') }}" class="btn btn-outline-secondary px-4">
                  <i class="bi bi-x-lg"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
