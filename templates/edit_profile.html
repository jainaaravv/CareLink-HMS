<!doctype html>
<html lang="en">
<head>
  <title>Edit Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
      min-height: 100vh;
    }
    .edit-container {
      max-width: 500px;
      margin: 60px auto;
      background: white;
      border-radius: 14px;
      padding: 32px 24px;
      box-shadow: 0 10px 28px rgba(33,147,176,0.07);
    }
    .pfp-preview {
      width: 70px; height:70px; border-radius: 50%; object-fit:cover; margin-bottom: 1rem; background: #eee;
    }
  </style>
</head>
<body>
<div class="edit-container">
  <h3>Edit Profile</h3>
  <form method="POST" enctype="multipart/form-data">
      <img src="{% if patient[3] %}/static/patient_pfps/{{ patient[3] }}{% else %}https://ui-avatars.com/api/?name={{ patient[0] | urlencode }}&background=5fa8d3&color=fff&size=80{% endif %}" class="pfp-preview mb-2">
      <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" name="name" value="{{ patient[0] }}" required>
      </div>
      <div class="mb-3">
          <label class="form-label">Contact</label>
          <input type="text" class="form-control" name="contact" value="{{ patient[1] }}" required>
      </div>
      <div class="mb-3">
          <label class="form-label">Age</label>
          <input type="number" class="form-control" name="age" value="{{ patient[2] or '' }}" min="0" max="120" required>
      </div>
      <div class="mb-3">
          <label class="form-label">Profile Picture</label>
          <input type="file" class="form-control" name="pfp" accept="image/*">
      </div>
      <button type="submit" class="btn btn-success">Save</button>
      <a href="{{ url_for('patient_dashboard') }}" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
</body>
</html>
